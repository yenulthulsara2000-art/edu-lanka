<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLanka Learning Hub</title>
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0a0f1d;
            --card: #161e2d; --text: #ffffff; --accent: #f1c40f;
            --success: #2ecc71;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--dark); color: var(--text); line-height: 1.6; }
        
        header {
            background: linear-gradient(rgba(10, 15, 29, 0.85), rgba(10, 15, 29, 0.85)), 
                        url('https://img.freepik.com/premium-vector/back-school-chalkboard-background-educational-design-projects_1326094-27993.jpg?semt=ais_hybrid&w=740&q=80');
            background-size: cover; background-position: center;
            height: 320px; display: flex; flex-direction: column; justify-content: center;
            align-items: center; border-bottom: 4px solid var(--accent); text-align: center;
            padding: 20px;
        }

        .grade-nav {
            display: flex; gap: 12px; margin-top: 25px; flex-wrap: wrap; justify-content: center;
        }
        .grade-btn {
            padding: 12px 28px; border: 2px solid var(--primary); background: transparent;
            color: white; border-radius: 50px; cursor: pointer; font-weight: 600; 
            transition: all 0.3s ease; font-size: 0.9rem;
        }
        .grade-btn.active, .grade-btn:hover {
            background: var(--primary); color: var(--dark); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .container { max-width: 1200px; margin: -40px auto 60px; padding: 0 20px; }
        
        .grade-section { display: none; animation: slideUp 0.5s ease-out forwards; }
        .grade-section.active { display: block; }

        .subjects-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); 
            gap: 25px; 
        }

        .subject-card {
            background: var(--card); border-radius: 18px; overflow: hidden;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); text-decoration: none;
            display: flex; flex-direction: column; color: inherit;
        }
        .subject-card:hover { transform: translateY(-8px); border-color: var(--accent); }
        
        .subject-img { width: 100%; height: 150px; object-fit: cover; }
        .subject-info { padding: 20px; text-align: center; }
        .subject-info h3 { color: var(--accent); margin-bottom: 8px; font-size: 1.25rem; }
        .subject-info p { font-size: 0.85rem; color: #a0a0a0; }

        footer { text-align: center; padding: 50px; opacity: 0.5; font-size: 0.9rem; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <h1>EduLanka Pro</h1>
    <p>Empowering Sri Lankan Students with Digital Excellence</p>
    <div class="grade-nav">
        <button class="grade-btn active" onclick="showGrade('g6', this)">Grade 6</button>
        <button class="grade-btn" onclick="showGrade('g7', this)">Grade 7</button>
        <button class="grade-btn" onclick="showGrade('g8', this)">Grade 8</button>
        <button class="grade-btn" onclick="showGrade('g9', this)">Grade 9</button>
    </div>
</header>

<div class="container" id="main-content">
    </div>

<footer>&copy; 2026 EduLanka Pro - Sri Lanka Education Support</footer>

<script>
    const subjects = [
        { name: "Science", img: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?w=400", desc: "Experiments & Theory" },
        { name: "Mathematics", img: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=400", desc: "Numbers & Logic" },
        { name: "English", img: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=400", desc: "Language & Literature" },
        { name: "Civic Education", img: "https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=400", desc: "Society & Rights" },
        { name: "Geography", img: "https://images.unsplash.com/photo-1521295121783-8a321d551ad2?w=400", desc: "World & Environment" },
        { name: "Health", img: "https://media.istockphoto.com/id/1457889029/photo/group-of-food-with-high-content-of-dietary-fiber-arranged-side-by-side.jpg?s=612x612&w=0&k=20&c=SEyObHsbBsrd1XZlgEg389VT86BMFKZKfKReKyVPAk4=" },
        { name: "ICT", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=400", desc: "Digital Technology" }
    ];

    const grades = [6, 7, 8, 9];

    function init() {
        const container = document.getElementById('main-content');
        
        grades.forEach(grade => {
            const section = document.createElement('div');
            section.id = `g${grade}`;
            section.className = `grade-section ${grade === 6 ? 'active' : ''}`;
            
            let gridHTML = `<h2 style="margin-bottom: 25px; text-align: center;">Grade ${grade} Curriculum</h2>`;
            gridHTML += `<div class="subjects-grid">`;
            
            subjects.forEach(sub => {
                const fileName = `grade${grade}_${sub.name.toLowerCase().replace(' ', '_')}.html`;
                gridHTML += `
                    <a href="${fileName}" class="subject-card">
                        <img src="${sub.img}" class="subject-img" alt="${sub.name}">
                        <div class="subject-info">
                            <h3>${sub.name}</h3>
                            <p>${sub.desc}</p>
                        </div>
                    </a>`;
            });
            
            gridHTML += `</div>`;
            section.innerHTML = gridHTML;
            container.appendChild(section);
        });
    }

    function showGrade(gradeId, btn) {
        document.querySelectorAll('.grade-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(gradeId).classList.add('active');
        btn.classList.add('active');
        window.scrollTo({ top: 200, behavior: 'smooth' });
    }

    // Run on load
    init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLanka | Explore Education</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f1c40f; --dark-bg: #0f172a; --card-bg: #1e293b; --text: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text); }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(15, 23, 42, 0.95);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 26px; font-weight: 700; }
        .logo span { color: var(--primary); }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { color: white; text-decoration: none; font-size: 15px; }
        .join-btn {
            background: var(--primary); color: #000; padding: 10px 25px;
            border-radius: 50px; font-weight: 600; text-decoration: none;
        }

        /* Hero Section - BGuide Style */
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&q=80&w=1200');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }
        .hero h1 { font-size: 70px; font-weight: 700; letter-spacing: 3px; }
        .hero p { font-size: 22px; color: #cbd5e1; margin-top: 10px; }

        /* Subjects Grid */
        .container { max-width: 1200px; margin: -60px auto 50px; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .subject-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            transition: 0.4s; border: 1px solid rgba(255,255,255,0.05); text-decoration: none; color: white;
        }
        .subject-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 25px; text-align: center; }
        .card-info h3 { font-size: 24px; margin-bottom: 5px; color: var(--primary); }
    </style>
</head>
<body>

<nav>
    <div class="logo">Edu<span>Lanka</span></div>
    <ul class="nav-links">
        <li><a href="#">Explore</a></li>
        <li><a href="#">Subjects</a></li>
        <li><a href="#">Grades</a></li>
    </ul>
    <a href="#" class="join-btn">Join Us</a>
</nav>

<div class="hero">
    <h1>BEYOND LEARNING</h1>
    <p>Your Ultimate Grade 6 Digital Guide</p>
</div>

<div class="container">
    <div class="grid">
        <a href="grade6_science.html" class="subject-card">
            <img src="https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&q=80&w=500" class="card-img">
            <div class="card-info">
                <h3>Science</h3>
                <p>11 Lessons | 275 Questions</p>
            </div>
        </a>

        <a href="#" class="subject-card">
            <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&q=80&w=500" class="card-img">
            <div class="card-info">
                <h3>Mathematics</h3>
                <p>Coming Soon</p>
            </div>
        </a>

        <a href="#" class="subject-card">
            <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=500" class="card-img">
            <div class="card-info">
                <h3>ICT</h3>
                <p>Coming Soon</p>
            </div>
        </a>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLanka Learning Hub</title>
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0a0f1d;
            --card: #161e2d; --text: #ffffff; --accent: #f1c40f;
            --success: #2ecc71; --error: #e74c3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--dark); color: var(--text); }
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&q=80&w=1200');
            height: 250px; display: flex; flex-direction: column; justify-content: center;
            align-items: center; border-bottom: 4px solid var(--accent); text-align: center;
        }
        .container { max-width: 1100px; margin: -50px auto 50px; padding: 0 20px; }
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .subject-card {
            background: var(--card); border-radius: 20px; overflow: hidden;
            transition: 0.4s; border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .subject-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .subject-img { width: 100%; height: 180px; object-fit: cover; }
        .subject-info { padding: 20px; text-align: center; }
        .subject-info h3 { color: var(--accent); }
        footer { text-align: center; padding: 40px; opacity: 0.6; }
    </style>
</head>
<body>

<header>
    <h1>EduLanka Pro</h1>
    <p>Select Your Grade 6 Subject to Start</p>
</header>

<div class="container">
    <div class="subjects-grid">
        <a href="grade6_science.html" style="text-decoration: none; color: inherit;">
            <div class="subject-card">
                <img src="https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&q=80&w=500" class="subject-img">
                <div class="subject-info"><h3>Science</h3><p>11 Lessons | Quiz Ready</p></div>
            </div>
        </a>
        <a href="grade6_maths.html" style="text-decoration: none; color: inherit;">
            <div class="subject-card">
                <img src="https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&q=80&w=500" class="subject-img">
                <div class="subject-info"><h3>Mathematics</h3><p>Coming Soon</p></div>
            </div>
        </a>
        <a href="grade6_ict.html" style="text-decoration: none; color: inherit;">
            <div class="subject-card">
                <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=500" class="subject-img">
                <div class="subject-info"><h3>ICT</h3><p>Coming Soon</p></div>
            </div>
        </a>
    </div>
</div>

<footer>&copy; 2026 EduLanka Pro - Sri Lanka Education Support</footer>
</body>
</html>

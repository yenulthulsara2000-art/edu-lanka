<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 6 Science - Full Syllabus Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --dark: #0a0f1d;
            --card: #161e2d; --text: #ffffff; --accent: #f1c40f;
            --success: #2ecc71; --error: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--dark); color: var(--text); overflow-x: hidden; }

        /* Header Section */
        header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&q=80&w=1200');
            height: 250px; background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; border-bottom: 4px solid var(--accent); text-align: center;
        }

        .container { max-width: 1000px; margin: -50px auto 50px; padding: 0 20px; }

        /* Lesson Grid */
        #lesson-view { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .lesson-card {
            background: var(--card); padding: 25px; border-radius: 15px;
            border-left: 6px solid var(--primary); cursor: pointer;
            transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; justify-content: space-between; align-items: center;
        }
        .lesson-card:hover { transform: translateY(-5px); background: #1e273a; border-left-color: var(--accent); }
        .lesson-number { font-weight: 600; color: var(--accent); margin-right: 10px; }

        /* Quiz UI */
        #quiz-ui { display: none; background: var(--card); padding: 40px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .score-bar { display: flex; justify-content: space-between; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #334155; color: var(--accent); font-weight: bold; }
        .q-text { font-size: 1.4rem; margin-bottom: 30px; color: var(--primary); line-height: 1.4; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .opt-btn {
            padding: 18px; background: #1e293b; color: white; border: 2px solid #334155;
            border-radius: 12px; cursor: pointer; text-align: left; font-size: 1.1rem; transition: 0.3s;
        }
        .opt-btn:hover { border-color: var(--primary); background: #25334d; }
        .correct { background: var(--success) !important; border-color: #27ae60 !important; }
        .wrong { background: var(--error) !important; border-color: #c0392b !important; }

        .controls { margin-top: 30px; overflow: hidden; }
        .next-btn { background: var(--accent); color: black; padding: 12px 35px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; float: right; display: none; font-size: 1rem; }
        .back-link { color: var(--primary); cursor: pointer; margin-bottom: 25px; display: inline-block; font-weight: 600; }

        footer { text-align: center; padding: 50px; opacity: 0.5; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>Grade 6 Science</h1>
    <p>Sri Lankan Syllabus | Interactive Learning Hub</p>
</header>

<div class="container">
    <div id="lesson-view">
        <h2 style="grid-column: 1/-1; margin-bottom: 10px;">All Lessons (11)</h2>
        </div>

    <div id="quiz-ui">
        <span class="back-link" onclick="exitQuiz()">← Back to Lessons List</span>
        <div class="score-bar">
            <span id="lesson-title-display">Lesson Name</span>
            <span>Score: <span id="current-score">0</span>/25</span>
        </div>
        <div id="quiz-box">
            <p id="progress" style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 10px;">Question 1 of 25</p>
            <h3 id="q-text" class="q-text"></h3>
            <div id="options-container" class="options-grid"></div>
            <div class="controls">
                <button id="next-btn" class="next-btn" onclick="handleNext()">Next Question →</button>
            </div>
        </div>
    </div>
</div>

<footer>&copy; 2026 EduLanka Pro - Science Department</footer>

<script>
    const scienceDatabase = [
        { 
            title: "Diversity of Living Things", 
            questions: [
                { q: "Which of these is a flowering plant?", opts: ["Moss", "Cycas", "Hibiscus", "Fern"], a: 2 },
                { q: "An example for a vertebrate animal is:", opts: ["Butterfly", "Frog", "Earthworm", "Snail"], a: 1 },
                { q: "The process of green plants making their own food is:", opts: ["Respiration", "Digestion", "Photosynthesis", "Excretion"], a: 2 },
                { q: "Which plant has a tap root system?", opts: ["Coconut", "Mango", "Paddy", "Maize"], a: 1 },
                { q: "Animals without a backbone are called:", opts: ["Vertebrates", "Mammals", "Invertebrates", "Reptiles"], a: 2 },
                { q: "Which part of the plant absorbs water and minerals?", opts: ["Leaf", "Stem", "Root", "Flower"], a: 2 },
                { q: "An example of a non-flowering plant is:", opts: ["Rose", "Cycas", "Papaya", "Jasmine"], a: 1 },
                { q: "Which gas is released during photosynthesis?", opts: ["Oxygen", "Carbon dioxide", "Nitrogen", "Hydrogen"], a: 0 },
                { q: "The habitat of a water lily is:", opts: ["Terrestrial", "Aquatic", "Aerial", "Arboreal"], a: 1 },
                { q: "Which of these is a characteristic of living things?", opts: ["Growth", "Nutrition", "Reproduction", "All of above"], a: 3 },
                { q: "Which is an underground stem used for food storage?", opts: ["Carrot", "Potato", "Beetroot", "Sweet Potato"], a: 1 },
                { q: "Example of a plant with a fibrous root system is:", opts: ["Mango", "Coconut", "Jak", "Balsam"], a: 1 },
                { q: "Which animal uses moist skin for respiration?", opts: ["Fish", "Bird", "Earthworm", "Lizard"], a: 2 },
                { q: "A plant that shows rapid movements when touched is:", opts: ["Rose", "Mimosa (Nidikumba)", "Lotus", "Mango"], a: 1 },
                { q: "Which is a vertebrate that lives both on land and in water?", opts: ["Fish", "Frog", "Snake", "Crocodile"], a: 1 },
                { q: "Non-flowering plants reproduce mainly by:", opts: ["Seeds", "Flowers", "Spores", "Roots"], a: 2 },
                { q: "Which animal has a streamlined body?", opts: ["Crab", "Fish", "Snail", "Turtle"], a: 1 },
                { q: "Plants that do not have a prominent stem are called:", opts: ["Trees", "Shrubs", "Herbs", "Creepers"], a: 2 },
                { q: "Which of these is a micro-organism?", opts: ["Ant", "Bacteria", "Worm", "Tick"], a: 1 },
                { q: "Primary source of energy for photosynthesis is:", opts: ["Water", "Soil", "Sunlight", "Fertilizer"], a: 2 },
                { q: "An example of an animal with an exoskeleton is:", opts: ["Dog", "Cat", "Beetle", "Frog"], a: 2 },
                { q: "Which of these is a submerged aquatic plant?", opts: ["Lotus", "Hydrilla", "Water Lily", "Salvinia"], a: 1 },
                { q: "The movement of animals from place to place is called:", opts: ["Growth", "Locomotion", "Nutrition", "Excretion"], a: 1 },
                { q: "Which gas do living things take in during respiration?", opts: ["Oxygen", "Carbon dioxide", "Nitrogen", "Argon"], a: 0 },
                { q: "Identifying and grouping living things based on similarities is:", opts: ["Evolution", "Classification", "Photosynthesis", "Respiration"], a: 1 }
            ]
        },
        { title: "Things Around Us", questions: [
            { q: "Which state of matter has a definite shape and volume?", opts: ["Solid", "Liquid", "Gas", "Plasma"], a: 0 },
            { q: "Anything that has mass and occupies space is:", opts: ["Energy", "Matter", "Sound", "Vacuum"], a: 1 },
            { q: "The state of matter that can be easily compressed is:", opts: ["Solid", "Liquid", "Gas", "Stone"], a: 2 },
            { q: "Which of these is a liquid at room temperature?", opts: ["Iron", "Oxygen", "Water", "Wood"], a: 2 },
            { q: "When a solid turns into a liquid, the process is called:", opts: ["Freezing", "Evaporation", "Melting", "Condensation"], a: 2 },
            // මීළඟ වටයේදී මෙහි තවත් ප්‍රශ්න 20ක් එක් කෙරේ
        ]},
        { title: "Water as a Resource", questions: [] },
        { title: "Living Organisms and Environment", questions: [] },
        { title: "Energy", questions: [] },
        { title: "Light", questions: [] },
        { title: "Sound", questions: [] },
        { title: "Magnetism", questions: [] },
        { title: "Electricity", questions: [] },
        { title: "Rocks and Minerals", questions: [] },
        { title: "Soil", questions: [] }
    ];

    let currentL = null;
    let qIdx = 0;
    let score = 0;

    function init() {
        const view = document.getElementById('lesson-view');
        scienceDatabase.forEach((l, i) => {
            view.innerHTML += `
                <div class="lesson-card" onclick="startQuiz(${i})">
                    <div>
                        <span class="lesson-number">${i+1}.</span>
                        <span>${l.title}</span>
                    </div>
                    <span style="font-size: 0.8rem; opacity: 0.6;">25 Qs</span>
                </div>`;
        });
    }

    function startQuiz(i) {
        currentL = scienceDatabase[i];
        if(!currentL.questions || currentL.questions.length === 0) {
            alert("Questions for this lesson are being updated. Try Lesson 1!");
            return;
        }
        qIdx = 0; score = 0;
        document.getElementById('lesson-view').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('lesson-title-display').innerText = currentL.title;
        renderQ();
    }

    function renderQ() {
        const data = currentL.questions[qIdx];
        document.getElementById('progress').innerText = `Question ${qIdx + 1} of ${currentL.questions.length}`;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('current-score').innerText = score;
        document.getElementById('next-btn').style.display = 'none';

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        data.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                const all = container.children;
                for(let b of all) b.style.pointerEvents = 'none';
                if(i === data.a) { btn.classList.add('correct'); score++; }
                else { btn.classList.add('wrong'); all[data.a].classList.add('correct'); }
                document.getElementById('next-btn').style.display = 'block';
                document.getElementById('current-score').innerText = score;
            };
            container.appendChild(btn);
        });
    }

    function handleNext() {
        qIdx++;
        if(qIdx < currentL.questions.length) renderQ();
        else { alert("Quiz Finished! Your Final Score: " + score); exitQuiz(); }
    }

    function exitQuiz() {
        document.getElementById('lesson-view').style.display = 'grid';
        document.getElementById('quiz-ui').style.display = 'none';
    }

    init();
</script>
</body>
</html>

    let currentL = null; let currentIdx = 0; let currentScore = 0;

    function init() {
        const view = document.getElementById('lesson-view');
        geoDB.forEach((l, i) => {
            view.innerHTML += `
                <div class="lesson-card" onclick="startQuiz(${i})">
                    <img src="${l.img}" class="lesson-img" alt="${l.title}">
                    <div class="lesson-info">
                        <h3>${l.title}</h3>
                        <span style="color: var(--primary);">➔</span>
                    </div>
                </div>`;
        });
    }

    function startQuiz(index) {
        currentL = geoDB[index];
        currentIdx = 0; currentScore = 0;
        document.getElementById('lesson-view').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        document.getElementById('quiz-bg-wrapper').style.backgroundImage = `url('${currentL.bg}')`;
        document.getElementById('l-name').innerText = currentL.title;
        renderQuestion();
    }

    function renderQuestion() {
        const qData = currentL.questions[currentIdx];
        document.getElementById('q-progress').innerText = `Question ${currentIdx + 1} of 100`;
        document.getElementById('q-text-display').innerText = qData.q;
        document.getElementById('score-display').innerText = currentScore;
        document.getElementById('next-btn-action').style.display = 'none';

        const box = document.getElementById('options-box');
        box.innerHTML = '';
        qData.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => {
                const btns = box.getElementsByTagName('button');
                for(let b of btns) b.style.pointerEvents = 'none';
                if(i === qData.a) { btn.classList.add('correct'); currentScore++; }
                else { btn.classList.add('wrong'); btns[qData.a].classList.add('correct'); }
                document.getElementById('score-display').innerText = currentScore;
                document.getElementById('next-btn-action').style.display = 'block';
            };
            box.appendChild(btn);
        });
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < 100) renderQuestion();
        else { 
            alert(`Lesson Completed! Final Score: ${currentScore}/100`); 
            location.reload(); 
        }
    }

    init();
</script>

    <style>
        :root {
            --primary: #00d2ff;
            --dark-bg: #0d1117;
            --card-bg: #161b22;
            --text: #c9d1d9;
            --accent: #f1c40f;
            --header-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            background: var(--header-gradient);
            border-bottom: 3px solid var(--accent);
            margin-bottom: 40px;
        }

        header h1 {
            color: var(--accent);
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        #lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .lesson-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #30363d;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .lesson-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border-color: var(--primary);
        }

        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 4px solid var(--accent);
        }

        .card-content {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-content h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--text);
        }

        .arrow {
            font-size: 1.5rem;
            color: var(--primary);
        }

        #quiz-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        #quiz-overlay-dark {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.85); 
            z-index: -1;
        }

        .quiz-box {
            max-width: 700px;
            margin: 50px auto;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background: #21262d;
            border: 1px solid #30363d;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: 0.2s;
        }

        .option-btn:hover {
            background: var(--primary);
            color: #000;
            font-weight: 600;
        }
        
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #ff4d4d;
            font-size: 2rem;
            cursor: pointer;
        }
    </style>
</head>

        title: "21. Probability",

    let currentLesson = null;
    let currentQIndex = 0;
    let userScore = 0;

    function init() {
        const grid = document.getElementById('lesson-grid');
        mathsDatabase.forEach((lesson, index) => {
            grid.innerHTML += `
                <div class="lesson-card" onclick="startQuiz(${index})">
                    <img src="${lesson.image}" class="card-image" alt="Lesson Image">
                    <div class="card-content">
                        <h3>${lesson.title}</h3>
                        <span class="arrow">→</span>
                    </div>
                </div>
            `;
        });
    }

    function startQuiz(index) {
        currentLesson = mathsDatabase[index];
        currentQIndex = 0;
        userScore = 0;
        
        const container = document.getElementById('quiz-container');
        container.style.backgroundImage = `url('${currentLesson.quizBg}')`;
        
        document.getElementById('quiz-title').innerText = currentLesson.title;
        document.getElementById('question-area').style.display = 'block';
        document.getElementById('score-screen').style.display = 'none';
        container.style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const q = currentLesson.questions[currentQIndex];
        document.getElementById('q-text').innerText = `${currentQIndex + 1}. ${q.q}`;
        const optionsArea = document.getElementById('options-area');
        optionsArea.innerHTML = '';
        q.opts.forEach((opt, i) => {
            optionsArea.innerHTML += `<button class="option-btn" onclick="checkAnswer(${i})">${opt}</button>`;
        });
    }

    function checkAnswer(choice) {
        if (choice === currentLesson.questions[currentQIndex].a) userScore++;
        currentQIndex++;
        if (currentQIndex < currentLesson.questions.length) showQuestion();
        else showScore();
    }

    function showScore() {
        document.getElementById('question-area').style.display = 'none';
        document.getElementById('score-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `Final Score: ${userScore} / ${currentLesson.questions.length}`;
    }

    function closeQuiz() {
        document.getElementById('quiz-container').style.display = 'none';
    }

    window.onload = init;
</script>
